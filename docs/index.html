<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoliMillionaire — Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e0ddd8;
      --text: #1a1917;
      --muted: #6b6a65;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --radius: 14px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 48px 20px 64px;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo svg { width: 40px; height: 40px; }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }
    header p {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: box-shadow 180ms ease, transform 180ms ease, border-color 180ms ease;
    }
    .card:hover {
      border-color: var(--primary);
      box-shadow: 0 6px 20px rgba(1,105,111,.12);
      transform: translateY(-2px);
    }
    .icon { font-size: 1.5rem; flex-shrink: 0; }
    .label { flex: 1; }
    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: color 180ms ease, transform 180ms ease;
    }
    .card:hover .arrow { color: var(--primary); transform: translateX(4px); }
    footer {
      text-align: center;
      margin-top: 56px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="PoliMillionaire logo">
        <circle cx="20" cy="20" r="20" fill="#01696f"/>
        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
              font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="white">P</text>
      </svg>
      <span style="font-weight:700;font-size:1.2rem;letter-spacing:-0.02em;">PoliMillionaire</span>
    </div>
    <h1>Documentation</h1>
    <p>Select a topic to explore the project docs.</p>
  </header>

  <nav class="grid" aria-label="Documentation pages">

    <a href="./evaluation_explained.html" class="card">
      <span class="icon">📊</span>
      <span class="label">Evaluation Explained</span>
      <span class="arrow">→</span>
    </a>
    <a href="./game_explained.html" class="card">
      <span class="icon">🎮</span>
      <span class="label">Game Explained</span>
      <span class="arrow">→</span>
    </a>
    <a href="./prompts_explained.html" class="card">
      <span class="icon">💬</span>
      <span class="label">Prompts Explained</span>
      <span class="arrow">→</span>
    </a>
    <a href="./rag_explained.html" class="card">
      <span class="icon">🔍</span>
      <span class="label">RAG Explained</span>
      <span class="arrow">→</span>
    </a>
    <a href="./strategies_explained.html" class="card">
      <span class="icon">♟️</span>
      <span class="label">Strategies Explained</span>
      <span class="arrow">→</span>
    </a>
    <a href="./tools_explained.html" class="card">
      <span class="icon">🔧</span>
      <span class="label">Tools Explained</span>
      <span class="arrow">→</span>
    </a>
  </nav>

  <footer>
    <p>PoliMillionaire · Politecnico di Milano</p>
  </footer>
</body>
</html>
