<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoliMillionaire — Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e0ddd8;
      --text: #1a1917;
      --muted: #6b6a65;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --radius: 14px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .pm-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #01696f, #0c4e54);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(1,105,111,0.35);
      flex-shrink: 0;
    }
    .pm-icon svg {
      color: #fff;
      width: 26px;
      height: 26px;
    }
    .logo-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    header p {
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 820px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      padding: 24px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: box-shadow .2s, transform .2s, border-color .2s;
    }
    a.card:hover {
      border-color: var(--primary);
      box-shadow: 0 6px 24px rgba(1,105,111,0.12);
      transform: translateY(-2px);
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #e8f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    .card-icon svg { width: 20px; height: 20px; }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .card-sub {
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="pm-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <span class="logo-name">PoliMillionaire</span>
    </div>
    <p>Documentation</p>
  </header>

  <div class="grid">
    <a class="card" href="./evaluation_explained.html">
      <div class="card-icon"><i data-lucide="bar-chart-3"></i></div>
      <div>
        <div class="card-title">Evaluation</div>
        <div class="card-sub">Model scoring &amp; metrics</div>
      </div>
    </a>
    <a class="card" href="./game_explained.html">
      <div class="card-icon"><i data-lucide="gamepad-2"></i></div>
      <div>
        <div class="card-title">Game</div>
        <div class="card-sub">Game logic &amp; flow</div>
      </div>
    </a>
    <a class="card" href="./prompts_explained.html">
      <div class="card-icon"><i data-lucide="messages-square"></i></div>
      <div>
        <div class="card-title">Prompts</div>
        <div class="card-sub">Prompt design &amp; templates</div>
      </div>
    </a>
    <a class="card" href="./rag_explained.html">
      <div class="card-icon"><i data-lucide="database-zap"></i></div>
      <div>
        <div class="card-title">RAG</div>
        <div class="card-sub">Retrieval-augmented generation</div>
      </div>
    </a>
    <a class="card" href="./strategies_explained.html">
      <div class="card-icon"><i data-lucide="route"></i></div>
      <div>
        <div class="card-title">Strategies</div>
        <div class="card-sub">Decision &amp; answer strategies</div>
      </div>
    </a>
    <a class="card" href="./tools_explained.html">
      <div class="card-icon"><i data-lucide="wrench"></i></div>
      <div>
        <div class="card-title">Tools</div>
        <div class="card-sub">Utilities &amp; integrations</div>
      </div>
    </a>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
